name: Linting, auditing and building

on: push

jobs:
    Ruff-linting:
        runs-on: ubuntu-latest
        steps:
            - name: Checkout repo
              uses: actions/checkout@v7

            - name: Lint check with ruff
              uses: astral-sh/ruff-action@v4.1.0
              with:
                src: anubis/
    
    Python-Dependency-Vulnerability-Scanning:
        runs-on: ubuntu-latest
        steps:
            - name: Checkout repo
              uses: actions/checkout@v7
              
            - uses: pypa/gh-action-pip-audit@v1.1.0
              with:
                  inputs: requirements.txt

    Image-building:
        if: ${{ github.ref != 'refs/heads/master' && github.ref_type == 'branch' }}
        runs-on: ubuntu-latest
        steps:
            - name: Checkout repo
              uses: actions/checkout@v7

            - name: Build image (without pushing)
              uses: docker/build-push-action@v7
              with:
                file: docker/Dockerfile-prod
                context: .
                push: false

    Container-Scanning:
            runs-on: ubuntu-latest
            permissions:
                contents: read
                security-events: write
            steps:
                - name: Checkout repo
                  uses: actions/checkout@v7

                - name: Build image for scanning
                  uses: docker/build-push-action@v7
                  with:
                    file: docker/Dockerfile-prod
                    context: .
                    push: false
                    load: true
                    tags: anubis:trivy-scan

                - name: Trivy scan (CRITICAL+HIGH -> SARIF, no fail)
                  uses: aquasecurity/trivy-action@v0.36.0
                  with:
                    image-ref: anubis:trivy-scan
                    format: sarif
                    output: trivy-results.sarif
                    severity: CRITICAL,HIGH
                    exit-code: '0'
                    ignore-unfixed: true

                - name: Trivy gate (CRITICAL -> fail build)
                  uses: aquasecurity/trivy-action@v0.36.0
                  with:
                    image-ref: anubis:trivy-scan
                    severity: CRITICAL
                    exit-code: '1'
                    ignore-unfixed: true

                - name: Upload Trivy SARIF
                  if: always()
                  uses: github/codeql-action/upload-sarif@v4
                  with:
                    sarif_file: trivy-results.sarif
                    category: trivy