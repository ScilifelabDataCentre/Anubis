name: e2e call lifecycle tests

on:
    pull_request:
        branches: [ "master" ]
    push:
        branches: [ "ci/e2e-tests" ]

jobs:
    e2e:
        runs-on: ubuntu-latest
        steps:
            - name: Checkout repo
              uses: actions/checkout@v6
            
            - name: Start test environment
              run: docker-compose -f docker-compose.test.yml up --detach --build

            - name: Wait for Anubis to be ready
              run: until curl -s http://localhost:8080 > /dev/null; do sleep 1; done
            
            - name: Install dependencies
              run: pip install -r tests/requirements.txt
            
            - name: Install Playwright browser binaries
              run: playwright install chromium

            - name: Run Playwright tests
              working-directory: tests
              env: 
                BASE_URL: http://localhost:8080
              run: pytest test_browser_call_lifecycle.py
            
            - name: Teardown test environment
              if: always()
              run: docker-compose -f docker-compose.test.yml down -v